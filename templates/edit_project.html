<!DOCTYPE html>
<html>
<head>

<title>Edit Project</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#111;
    color:white;
    font-family:Inter,sans-serif;
    display:flex;
    justify-content:center;
    padding:60px 20px;
    margin:0;
}

.form-box{
    width:100%;
    max-width:520px;
    background:#1f1f1f;
    padding:40px;
    border-radius:14px;
    box-sizing:border-box;
}

h2{
    margin-top:0;
}

img.cover{
    width:100%;
    border-radius:10px;
    margin-bottom:20px;
}

input,textarea,select{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    background:#222;
    border:none;
    color:white;
    border-radius:6px;
    box-sizing:border-box;
}

label{
    font-size:14px;
    color:#aaa;
    display:block;
    margin-bottom:6px;
}

button{
    width:100%;
    padding:12px;
    background:#c9a227;
    border:none;
    font-weight:600;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    opacity:0.9;
}

.catalogue-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:10px;
    margin-bottom:20px;
}

.catalogue-item{
    position:relative;
}

.catalogue-item img{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:6px;
}

.delete-btn{
    position:absolute;
    top:-6px;
    right:-6px;
    background:red;
    border:none;
    color:white;
    width:20px;
    height:20px;
    border-radius:50%;
    font-size:12px;
    cursor:pointer;
}

.checkbox-group{
    margin-bottom:20px;
}

.checkbox-group label{
    display:flex;
    align-items:center;
    gap:10px;
}

.checkbox-group input{
    width:auto;
}

@media (max-width:768px){

body{
    padding:20px;
}

.form-box{
    padding:25px;
}

}

</style>

</head>

<body>

<div class="form-box">

<h2>Edit Project</h2>

<img class="cover" src="{{ project.cover_image.url }}">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Title</label>
<input type="text" name="title" value="{{ project.title }}" required>

<label>Description</label>
<textarea name="description" rows="4">{{ project.description }}</textarea>

<label>Category</label>

<select name="category">

{% for category in categories %}

<option value="{{ category.id }}"
{% if category.id == project.category.id %}selected{% endif %}>
{{ category.name }}
</option>

{% endfor %}

</select>

<label>Replace Cover Image</label>
<input type="file" name="cover_image">

<label>Existing Catalogue Images</label>

<div class="catalogue-grid">

{% for image in project.catalogue_images.all %}

<div class="catalogue-item">

<img src="{{ image.image.url }}">

<a href="/delete-image/{{ image.id }}/">
<button type="button" class="delete-btn">×</button>
</a>

</div>

{% endfor %}

</div>

<label>Add New Catalogue Images</label>
<input type="file" name="catalogue_images" multiple>

<div class="checkbox-group">
<label>
<input type="checkbox" name="featured"
{% if project.featured %}checked{% endif %}>
Featured
</label>
</div>

<div class="checkbox-group">
<label>
<input type="checkbox" name="is_published"
{% if project.is_published %}checked{% endif %}>
Published
</label>
</div>

<button type="submit">Update Project</button>

</form>

</div>

</body>
</html>
