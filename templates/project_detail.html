<!DOCTYPE html>
<html>
<head>
    <title>{{ project.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            padding: 60px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 60px;
        }

        img {
            width: 100%;
            margin-top: 40px;
            border-radius: 12px;
        }

        p {
            margin-top: 30px;
            line-height: 1.7;
            color: #aaa;
        }

        a {
            color: #c9a227;
            text-decoration: none;
        }

        .catalogue {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        .catalogue img {
            width: 100%;
            margin-bottom: 25px;
            border-radius: 10px;
        }

        .catalogue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .catalogue-item img {
            width: 100%;
            border-radius: 10px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .catalogue-item img:hover {
            transform: scale(1.03);
        }

        .catalogue-item{
            overflow:hidden;
        }
    </style>
</head>

<body>

<a href="/">← Back</a>

<h1>{{ project.title }}</h1>

<img src="{{ project.cover_image.url }}">

<p>{{ project.description }}</p>

<div class="catalogue-grid">

    {% for img in project.catalogue_images.all %}
        <div class="catalogue-item">
            <img src="{{ img.image.url }}" alt="">
        </div>
    {% endfor %}

</div>

</body>
</html>
